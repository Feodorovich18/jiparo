<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Contable - Crear Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">

<div class="flex min-h-screen">

    <!-- ============================= -->
    <!-- SIDEBAR -->

    <aside class="w-64 bg-gradient-to-b from-slate-900 to-slate-950 text-white flex flex-col justify-between">
        <div>
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-2xl font-bold">JIPARO</h1>
                <p class="text-xs text-slate-400">PANEL ADMINISTRATIVO</p>
            </div>

            <nav class="p-5 text-sm space-y-6">
                <div>
                    <p class="text-xs text-slate-400 tracking-widest mb-3">GENERAL</p>
                    <div class="space-y-2">
                        <a href="index.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800">
                            <i class="fa-solid fa-house text-blue-400"></i>
                            <span>INICIO</span>
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800">
                            <i class="fa-regular fa-id-badge"></i>
                            <span>USUARIOS</span>
                        </a>
                    </div>
                </div>
                <div>
                    <p class="text-xs text-slate-400 tracking-widest mb-3">OPERACIONES</p>
                    <div class="space-y-2">
                        <a href="catalogos.html" class="flex items-center gap-3 p-3 rounded-lg bg-slate-800">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Contabilidad</span>
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800">
                            <i class="fa-solid fa-money-bill-wave"></i>
                            <span>Nómina</span>
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800">
                            <i class="fa-solid fa-boxes-stacked"></i>
                            <span>Inventario</span>
                        </a>
                    </div>
                </div>
            </nav>
        </div>

        <div class="p-5 border-t border-slate-800">
            <p class="text-xs text-slate-400">Usuario</p>
            <p class="font-semibold mb-4">Administrador</p>
            <button class="w-full bg-red-600 hover:bg-red-700 transition p-2 rounded-lg">Cerrar sesión</button>
        </div>
    </aside>

    <!-- ============================= -->
    <!-- CONTENIDO PRINCIPAL -->
    <!-- ============================= -->
    <main class="flex-1 p-10" x-data="{ campos: [''] }">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-4xl font-bold text-gray-800">Nombre de la empresa</h2>
            <div class="flex items-center gap-3">
                <span class="text-gray-600">Nombre del cliente</span>
                <div class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center">UR</div>
            </div>
        </div>

        <!-- FORMULARIO CREAR CATALOGO -->
        <div class="mx-auto">
            <div class="bg-white w-full rounded-xl shadow-lg p-8">
                <div class="flex justify-between mb-6">
                    <h2 class="text-xl font-bold">Crear catálogo contable</h2>
                    <a href="catalogo.html" class="text-gray-500 hover:text-gray-700">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </a>
                </div>

                <form class="space-y-5">
                    <!-- NOMBRE DEL CATALOGO -->
                    <div>
                        <label class="text-sm text-gray-600 font-medium">Nombre del catálogo</label>
                        <input type="text" placeholder="Ejemplo: Catálogo 2026" class="w-full border p-2 rounded-lg mt-1">
                    </div>

                    <!-- CAMPOS DINAMICOS -->
                    <div class="flex flex-col">
                        <label class="text-sm text-gray-600 font-medium mb-2">Campos la Cuenta Mayor</label>
                        <div class="max-h-60 overflow-y-auto pr-2 space-y-2 border rounded-lg p-3">
                            <template x-for="(campo,index) in campos" :key="index">
                                <div class="flex gap-3">
                                    <select name="codigo_entero" class="w-full border rounded-lg px-3 py-2">
                                        <option value="">Seleccione un código entero</option>
                                        <option value="100">100 - Activo</option>
                                        <option value="101">101 - Caja</option>
                                        <option value="102">102 - Bancos</option>
                                        <option value="103">103 - Inversiones</option>
                                        <option value="104">104 - Otros instrumentos financieros</option>
                                        <option value="105">105 - Clientes</option>
                                        <option value="106">106 - Cuentas y documentos por cobrar a corto plazo</option>
                                        <option value="107">107 - Deudores diversos</option>
                                        <option value="108">108 - Estimación de cuentas incobrables</option>
                                        <option value="109">109 - Pagos anticipados</option>
                                        <option value="110">110 - Subsidio al empleo por aplicar</option>
                                        <option value="111">111 - Crédito al diesel por acreditar</option>
                                        <option value="112">112 - Otros estímulos</option>
                                        <option value="113">113 - Impuestos a favor</option>
                                        <option value="114">114 - Pagos provisionales</option>
                                        <option value="115">115 - Inventario</option>
                                        <option value="116">116 - Estimación de inventarios obsoletos y de lento movimiento</option>
                                        <option value="117">117 - Obras en proceso de inmuebles</option>
                                        <option value="118">118 - Impuestos acreditables pagados</option>
                                        <option value="119">119 - Impuestos acreditables por pagar</option>
                                        <option value="120">120 - Anticipo a proveedores</option>
                                        <option value="121">121 - Otros activos a corto plazo</option>
                                        <option value="151">151 - Terrenos</option>
                                        <option value="152">152 - Edificios</option>
                                        <option value="153">153 - Maquinaria y equipo</option>
                                        <option value="154">154 - Automóviles, autobuses, camiones de carga, tractocamiones, montacargas y remolques</option>
                                        <option value="155">155 - Mobiliario y equipo de oficina</option>
                                        <option value="156">156 - Equipo de cómputo</option>
                                        <option value="157">157 - Equipo de comunicación</option>
                                        <option value="158">158 - Activos biológicos, vegetales y semovientes</option>
                                        <option value="159">159 - Obras en proceso de activos fijos</option>
                                        <option value="160">160 - Otros activos fijos</option>
                                        <option value="161">161 - Ferrocarriles</option>
                                        <option value="162">162 - Embarcaciones</option>
                                        <option value="163">163 - Aviones</option>
                                        <option value="164">164 - Troqueles, moldes, matrices y herramental</option>
                                        <option value="165">165 - Equipo de comunicaciones telefónicas</option>
                                        <option value="166">166 - Equipo de comunicación satelital</option>
                                        <option value="167">167 - Equipo de adaptaciones para personas con capacidades diferentes</option>
                                        <option value="168">168 - Maquinaria y equipo de generación de energía de fuentes renovables o de sistemas de cogeneración de electricidad eficiente</option>
                                        <option value="169">169 - Otra maquinaria y equipo</option>
                                        <option value="170">170 - Adaptaciones y mejoras</option>
                                        <option value="171">171 - Depreciación acumulada de activos fijos</option>
                                        <option value="172">172 - Pérdida por deterioro acumulado de activos fijos</option>
                                        <option value="173">173 - Gastos diferidos</option>
                                        <option value="174">174 - Gastos pre operativos</option>
                                        <option value="175">175 - Regalías, asistencia técnica y otros gastos diferidos</option>
                                        <option value="176">176 - Activos intangibles</option>
                                        <option value="177">177 - Gastos de organización</option>
                                        <option value="178">178 - Investigación y desarrollo de mercado</option>
                                        <option value="179">179 - Marcas y patentes</option>
                                        <option value="180">180 - Crédito mercantil</option>
                                        <option value="181">181 - Gastos de instalación</option>
                                        <option value="182">182 - Otros activos diferidos</option>
                                        <option value="183">183 - Amortización acumulada de activos diferidos</option>
                                        <option value="184">184 - Depósitos en garantía</option>
                                        <option value="185">185 - Impuestos diferidos</option>
                                        <option value="186">186 - Cuentas y documentos por cobrar a largo plazo</option>
                                        <option value="187">187 - Participación de los trabajadores en las utilidades diferidas</option>
                                        <option value="188">188 - Inversiones permanentes en acciones</option>
                                        <option value="189">189 - Estimación por deterioro de inversiones permanentes en acciones</option>
                                        <option value="190">190 - Otros instrumentos financieros</option>
                                        <option value="191">191 - Otros activos a largo plazo</option>
                                        <option value="200">200 - Pasivo</option>
                                        <option value="201">201 - Proveedores</option>
                                        <option value="202">202 - Cuentas por pagar a corto plazo</option>
                                        <option value="203">203 - Cobros anticipados a corto plazo</option>
                                        <option value="204">204 - Instrumentos financieros a corto plazo</option>
                                        <option value="205">205 - Acreedores diversos a corto plazo</option>
                                        <option value="206">206 - Anticipo de cliente</option>
                                        <option value="207">207 - Impuestos trasladados</option>
                                        <option value="208">208 - Impuestos trasladados cobrados</option>
                                        <option value="209">209 - Impuestos trasladados no cobrados</option>
                                        <option value="210">210 - Provisión de sueldos y salarios por pagar</option>
                                        <option value="211">211 - Provisión de contribuciones de seguridad social por pagar</option>
                                        <option value="212">212 - Provisión de impuesto estatal sobre nómina por pagar</option>
                                        <option value="213">213 - Impuestos y derechos por pagar</option>
                                        <option value="214">214 - Dividendos por pagar</option>
                                        <option value="215">215 - PTU por pagar</option>

                                        <option value="400">400 - Ingresos</option>
                                        <option value="401">401 - Ingresos</option>
                                        <option value="402">402 - Devoluciones, descuentos o bonificaciones sobre ingresos</option>
                                        <option value="403">403 - Otros ingresos</option>
                                        <option value="500">500 - Costos</option>
                                        <option value="501">501 - Costo de venta y/o servicio</option>
                                        <option value="502">502 - Compras</option>
                                        <option value="503">503 - Devoluciones, descuentos o bonificaciones sobre compras</option>
                                        <option value="504">504 - Otras cuentas de costos</option>
                                        <option value="505">505 - Costo de activo fijo</option>
                                        <option value="600">600 - Gastos</option>
                                        <option value="601">601 - Gastos generales</option>
                                        <option value="602">602 - Gastos de venta</option>
                                        <option value="603">603 - Gastos de administración</option>
                                        <option value="604">604 - Gastos de fabricación</option>
                                        <option value="605">605 - Mano de obra directa</option>
                                        <option value="606">606 - Facilidades administrativas fiscales</option>
                                        <option value="607">607 - Participación de los trabajadores en las utilidades</option>
                                        <option value="608">608 - Participación en resultados de subsidiarias</option>
                                        <option value="609">609 - Participación en resultados de asociadas</option>
                                        <option value="610">610 - Participación de los trabajadores en las utilidades diferida</option>
                                        <option value="611">611 - Impuesto Sobre la renta</option>
                                        <option value="612">612 - Gastos no deducibles para CUFIN</option>
                                        <option value="613">613 - Depreciación contable</option>
                                        <option value="614">614 - Amortización contable</option>
                                        <option value="700">700 - Resultado integral de financiamiento</option>
                                        <option value="701">701 - Gastos financieros</option>
                                        <option value="702">702 - Productos financieros</option>
                                        <option value="703">703 - Otros gastos</option>
                                        <option value="704">704 - Otros productos</option>
                                        <option value="800">800 - Cuentas de orden</option>
                                        <option value="801">801 - UFIN del ejercicio</option>
                                        <option value="802">802 - CUFIN del ejercicio</option>
                                        <option value="803">803 - CUFIN de ejercicios anteriores</option>
                                        <option value="804">804 - CUFINRE del ejercicio</option>
                                        <option value="805">805 - CUFINRE de ejercicios anteriores</option>
                                        <option value="806">806 - CUCA del ejercicio</option>
                                        <option value="807">807 - CUCA de ejercicios anteriores</option>
                                        <option value="808">808 - Ajuste anual por inflación acumulable</option>
                                        <option value="809">809 - Ajuste anual por inflación deducible</option>
                                        <option value="810">810 - Deducción de inversión</option>
                                        <option value="811">811 - Utilidad o pérdida fiscal en venta y/o baja de activo fijo</option>
                                        <option value="812">812 - Utilidad o pérdida fiscal en venta acciones o partes sociales</option>
                                        <option value="813">813 - Pérdidas fiscales pendientes de amortizar actualizadas de ejercicios anteriores</option>
                                        <option value="814">814 - Mercancías recibidas en consignación</option>
                                        <option value="815">815 - Crédito fiscal de IVA e IEPS por la importación de mercancías para empresas certificadas</option>
                                        <option value="816">816 - Crédito fiscal de IVA e IEPS por la importación de activos fijos para empresas certificadas</option>
                                        <option value="899">899 - Otras cuentas de orden</option>
                                        <option value="000">000 - Código para uso exclusivo de contribuyentes del sector financiero</option>
                                    </select>
                                    <button type="button" @click="campos.splice(index,1)" class="bg-red-500 text-white px-3 rounded-lg">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </template>
                        </div>
                        <button type="button" @click="campos.push('')" class="mt-3 bg-slate-700 text-white px-4 py-2 rounded-lg">
                            Agregar campo
                        </button>
                    </div>
                    <!--SUBCUENTAS-->
                    <div class="flex flex-col">
                        <label class="text-sm text-gray-600 font-medium mb-2">Campos de la SubCuentas</label>
                        <div class="max-h-60 overflow-y-auto pr-2 space-y-2 border rounded-lg p-3">
                            <template x-for="(campo,index) in campos" :key="index">
                                <div class="flex gap-3">
                                    <select x-model="campos[index]" class="w-full border p-2 rounded-lg">
                                        <option value="">Seleccionar campo</option>
                                        <option>Cuenta</option>
                                        <option>Subcuenta</option>
                                        <option>Descripción</option>
                                        <option>Tipo</option>
                                        <option>Naturaleza</option>
                                        <option>Nivel</option>
                                        <option>Saldo Inicial</option>
                                        <option>RFC</option>
                                        <option>Clave SAT</option>
                                    </select>
                                    <button type="button" @click="campos.splice(index,1)" class="bg-red-500 text-white px-3 rounded-lg">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </template>
                        </div>
                        <button type="button" @click="campos.push('')" class="mt-3 bg-slate-700 text-white px-4 py-2 rounded-lg">
                            Agregar campo
                        </button>
                    </div>

                    <!-- BOTON CREAR -->
                    <a href="catalogo.html" class="block w-full bg-blue-600 text-white p-2 rounded-lg mt-4 text-center hover:bg-blue-700">
                        Crear catálogo
                    </a>
                </form>
            </div>
        </div>

    </main>
</div>
</body>
</html>
